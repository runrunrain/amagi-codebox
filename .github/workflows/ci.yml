name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  go-quality:
    name: Go (${{ matrix.os }})
    needs: frontend-mobile
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download embedded web assets
        uses: actions/download-artifact@v4
        with:
          name: embedded-web-assets
          path: .

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1

  frontend-mobile:
    name: Frontend and mobile
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            mobile/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Build mobile
        run: npm run build
        working-directory: mobile

      - name: Test mobile
        run: npm run test
        working-directory: mobile

      - name: Upload embedded web assets
        uses: actions/upload-artifact@v4
        with:
          name: embedded-web-assets
          path: |
            frontend/dist
            mobile/dist
          if-no-files-found: error
