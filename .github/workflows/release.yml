name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build
        run: |
          wails build -ldflags "-X main.Version=${{ steps.get_version.outputs.VERSION }}"

      - name: Create ZIP archive
        run: |
          cd build/bin
          7z a -tzip ../../amagi-codebox-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip amagi-codebox.exe
        shell: cmd

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: amagi-codebox-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip
          generate_release_notes: true
